on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      UPLOAD_API_TOKEN: ${{ secrets.UPLOAD_API_TOKEN }}
      UPLOAD_BOT_ID: ${{ secrets.UPLOAD_BOT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout required submodule
        run: git submodule update --init ares-sc2

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'poetry'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install requirements
        run: poetry install --no-root

      - name: Compile ladder zip
        run: poetry run python scripts/create_ladder_zip.py

      - name: Verify ladder zip exists
        run: test -f bot.zip

      - name: Unpack ladder zip
        run: |
          rm -rf out
          mkdir -p out
          unzip -qq bot.zip -d out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ladder-zip
          path: out

      - name: Upload to AIArena
        if: ${{ env.UPLOAD_API_TOKEN != '' && env.UPLOAD_BOT_ID != '' }}
        run: poetry run python scripts/upload_to_ai_arena.py
